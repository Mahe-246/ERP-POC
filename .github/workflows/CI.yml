name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # BACKEND (.NET)
      # -------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Backend
        run: dotnet restore ./ERP.UserAPI/ERP.UserAPI/ERP.UserAPI.csproj

      - name: Build Backend
        run: dotnet build ./ERP.UserAPI/ERP.UserAPI/ERP.UserAPI.csproj --configuration Release --no-restore

      # -------------------------
      # FRONTEND (Angular)
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend
        working-directory: ./erp-user-ui
        run: npm install

      - name: Build Frontend
        working-directory: ./erp-user-ui
        run: npm run build

      # -------------------------
      # DOCKER LOGIN
      # -------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------------------------
      # BACKEND DOCKER IMAGE
      # -------------------------
      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/erp-backend ./ERP.UserAPI

      - name: Push Backend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/erp-backend

      # -------------------------
      # FRONTEND DOCKER IMAGE
      # -------------------------
      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/erp-frontend ./erp-user-ui

      - name: Push Frontend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/erp-frontend
